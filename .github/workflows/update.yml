name: Update AUR Package

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

concurrency:
  group: aur-update
  cancel-in-progress: false

jobs:
  # -----------------------------------------------------------------
  # Job 1: Check if update is needed (runs on Ubuntu, ~3s)
  # -----------------------------------------------------------------
  check:
    runs-on: ubuntu-latest
    outputs:
      needs_update: ${{ steps.check.outputs.needs_update }}
      current_version: ${{ steps.check.outputs.current_version }}
      upstream_version: ${{ steps.check.outputs.upstream_version }}

    steps:
      - name: Check versions
        id: check
        run: |
          # Fetch upstream version
          UPSTREAM=$(curl -fsSL "https://api.github.com/repos/OpenWhispr/openwhispr/releases/latest" | jq -r '.tag_name' | sed 's/^v//')

          if [[ -z "$UPSTREAM" || "$UPSTREAM" == "null" ]]; then
            echo "Failed to fetch upstream version"
            exit 1
          fi

          # Fetch current AUR version (PKGBUILD is accessible via raw URL)
          PKGBUILD=$(curl -fsSL "https://aur.archlinux.org/cgit/aur.git/plain/PKGBUILD?h=openwhispr-appimage")
          CURRENT=$(echo "$PKGBUILD" | grep '^pkgver=' | head -1 | cut -d= -f2)

          echo "upstream_version=${UPSTREAM}" >> "$GITHUB_OUTPUT"
          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "Upstream: ${UPSTREAM}, AUR: ${CURRENT}"

          if [[ "$CURRENT" == "$UPSTREAM" ]]; then
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Already at ${UPSTREAM}, no update needed"
          else
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Update needed: ${CURRENT} -> ${UPSTREAM}"
          fi

  # -----------------------------------------------------------------
  # Job 2: Update AUR (only runs if needed, ~20-30s)
  # -----------------------------------------------------------------
  update:
    needs: check
    if: needs.check.outputs.needs_update == 'true'
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install minimal dependencies
        run: |
          # Skip system upgrade (-Sy instead of -Syu) to save ~10s
          pacman -Sy --noconfirm \
            git \
            pacman-contrib \
            openssh \
            sudo

      - name: Create builder user
        run: |
          useradd -m -s /bin/bash builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          mkdir -p /home/builder/pkg
          chown -R builder:builder /home/builder/pkg

      - name: Configure SSH for AUR
        run: |
          mkdir -p /root/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > /root/.ssh/aur_key
          chmod 600 /root/.ssh/aur_key
          echo "aur.archlinux.org ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEuBKrPzbawxA/k2g6NcyV5jmqwJ2s+zpgZGZ7tpLIcN" >> /root/.ssh/known_hosts
          cat >> /root/.ssh/config <<'EOF'
          Host aur.archlinux.org
            IdentityFile /root/.ssh/aur_key
            User aur
          EOF

      - name: Clone AUR repository
        run: |
          git clone ssh://aur@aur.archlinux.org/openwhispr-appimage.git /home/builder/pkg
          chown -R builder:builder /home/builder/pkg

      - name: Update PKGBUILD
        run: |
          NEW_VER="${{ needs.check.outputs.upstream_version }}"
          sed -i "s/^pkgver=.*/pkgver=${NEW_VER}/" /home/builder/pkg/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" /home/builder/pkg/PKGBUILD

      - name: Update checksums
        run: |
          sudo -u builder bash -c "cd /home/builder/pkg && updpkgsums"
          if grep -q "SKIP" /home/builder/pkg/PKGBUILD; then
            echo "ERROR: updpkgsums failed"
            exit 1
          fi

      - name: Regenerate .SRCINFO
        run: |
          sudo -u builder bash -c "cd /home/builder/pkg && makepkg --printsrcinfo > .SRCINFO"

      - name: Commit and push
        run: |
          NEW_VER="${{ needs.check.outputs.upstream_version }}"
          git -C /home/builder/pkg config user.name "AUR Update Bot"
          git -C /home/builder/pkg config user.email "bot@users.noreply.github.com"
          git -C /home/builder/pkg add PKGBUILD .SRCINFO
          git -C /home/builder/pkg commit -m "upgpkg: openwhispr-appimage ${NEW_VER}"
          git -C /home/builder/pkg push

      - name: Summary
        run: |
          echo "## ✅ Updated to ${{ needs.check.outputs.upstream_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Previous: ${{ needs.check.outputs.current_version }}" >> "$GITHUB_STEP_SUMMARY"

  # -----------------------------------------------------------------
  # Job 3: Summary (always runs)
  # -----------------------------------------------------------------
  summary:
    needs: [check, update]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Final summary
        run: |
          if [[ "${{ needs.check.outputs.needs_update }}" == "false" ]]; then
            echo "## ⏭️ No update needed" >> "$GITHUB_STEP_SUMMARY"
            echo "Both at version **${{ needs.check.outputs.upstream_version }}**" >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.update.result }}" == "success" ]]; then
            echo "## ✅ Update successful" >> "$GITHUB_STEP_SUMMARY"
            echo "${{ needs.check.outputs.current_version }} → ${{ needs.check.outputs.upstream_version }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ❌ Update failed" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi